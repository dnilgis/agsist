<style>
button,a,[role="button"]{touch-action:manipulation;}
html{overflow-x:hidden;overflow-x:clip;width:100%;}
body{overflow-x:hidden;overflow-x:clip;width:100%;}

.arc-page{max-width:900px;margin:0 auto;padding:0 1rem 4rem;}

.arc-hero{padding:1.2rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.arc-hero-left .arc-eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem;}
.arc-hero-left h1{font-family:var(--font-display);font-size:1.7rem;font-weight:800;text-transform:uppercase;color:var(--text);margin:0 0 .2rem;}
.arc-hero-left .arc-sub{font-size:.82rem;color:var(--text-dim);line-height:1.55;}
.arc-back{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:.78rem;font-weight:600;color:var(--text-dim);text-decoration:none;transition:border-color .15s,color .15s;white-space:nowrap;min-height:44px;}
.arc-back:hover{border-color:var(--green);color:var(--green);}

/* Search */
.arc-search-bar{display:flex;align-items:center;gap:.65rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.arc-search-wrap{position:relative;flex:1;min-width:200px;}
.arc-search-wrap input{width:100%;padding:.6rem .9rem .6rem 2.1rem;background:var(--surface);border:2px solid var(--border);border-radius:6px;color:var(--text);font-size:1rem;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s;box-sizing:border-box;}
.arc-search-wrap input:focus{border-color:var(--green);}
.arc-search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.9rem;pointer-events:none;}
.arc-search-clear{position:absolute;right:.65rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.9rem;display:none;padding:0;line-height:1;}
.arc-search-clear.vis{display:block;}
.arc-filter-wrap{display:flex;gap:.4rem;flex-wrap:wrap;}
.arc-filter-btn{padding:.4rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.arc-filter-btn:hover,.arc-filter-btn.active{background:rgba(74,171,76,.1);border-color:var(--green);color:var(--green);}

/* Stats bar */
.arc-stats{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text-muted);margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.arc-stats-count{color:var(--text-dim);}
.arc-stats-count strong{color:var(--green);}

/* Month groups */
.arc-month-group{margin-bottom:2rem;}
.arc-month-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem;padding-bottom:.35rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.arc-month-count{font-size:.62rem;opacity:.7;}
.arc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.65rem;}

/* Cards */
.arc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;text-decoration:none;display:block;transition:border-color .15s,background .15s;}
.arc-card:hover{border-color:var(--gold);background:rgba(var(--gold-rgb),.02);}
.arc-card.wkend{opacity:.75;}
.arc-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;gap:.5rem;}
.arc-card-date{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;color:var(--text-muted);}
.arc-card-badge{font-family:'JetBrains Mono',monospace;font-size:.58rem;font-weight:700;padding:.08rem .35rem;border-radius:3px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
.arc-card-badge.wkday{background:rgba(74,171,76,.1);color:var(--green);border:1px solid rgba(74,171,76,.2);}
.arc-card-badge.wkend{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
.arc-card-hl{font-size:.82rem;font-weight:600;color:var(--text);line-height:1.45;margin-bottom:.2rem;}
.arc-card-hl.placeholder{color:var(--text-muted);font-weight:400;font-style:italic;font-size:.78rem;}
.arc-card-lead{font-size:.72rem;color:var(--text-muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

/* Loading / empty states */
.arc-loading{text-align:center;padding:3rem 1rem;color:var(--text-muted);}
.arc-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto .75rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.arc-empty{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);font-size:.88rem;}
.arc-empty strong{display:block;color:var(--text-dim);font-size:.95rem;margin-bottom:.3rem;}

/* Hidden during load */
.arc-content{display:none;}
.arc-content.vis{display:block;}

@media(max-width:500px){
  .arc-hero{flex-direction:column;align-items:flex-start;}
  .arc-grid{grid-template-columns:1fr;}
  .arc-filter-wrap{display:none;}/* hide month pills on mobile to save space */
}
</style>
</head>

  <div class="arc-hero">
    <div class="arc-hero-left">
      <div class="arc-eyebrow"><svg class="ic-sp" aria-hidden="true"><use href="#sp-newspaper"/></svg> AGSIST Daily</div>

        <span class="arc-search-icon"><svg class="ic-sp" aria-hidden="true"><use href="#sp-search"/></svg></span>
        <input type="search" id="arc-search" placeholder="Search headlines&hellip;" autocomplete="off" aria-label="Search briefings">

<script>
(function(){
'use strict';

var DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MON_NAMES  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MON_FULL   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var allEntries = [];    // full sorted list
var activeMonth = null; // null = all
var searchTerm  = '';

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseDateOnly(str){
  if(!str)return null;
  var dateOnly = str.indexOf('T')>-1 ? str.split('T')[0] : str;
  var d = new Date(dateOnly+'T12:00:00');
  return isNaN(d.getTime()) ? null : d;
}

function shortLabel(d){
  return DAY_NAMES[d.getDay()]+' '+MON_NAMES[d.getMonth()]+' '+d.getDate();
}

function monthKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function monthDisplay(key){
  var parts = key.split('-');
  return MON_FULL[parseInt(parts[1],10)-1]+' '+parts[0];
}

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  var filtered = allEntries.filter(function(e){
    var monthMatch = !activeMonth || e.monthKey === activeMonth;
    var searchMatch = !searchTerm || (e.headline||'').toLowerCase().indexOf(searchTerm) !== -1
                   || (e.date||'').indexOf(searchTerm) !== -1
                   || (e.shortLabel||'').toLowerCase().indexOf(searchTerm) !== -1;
    return monthMatch && searchMatch;
  });

  var statsEl = document.getElementById('arc-stats');
  var bodyEl  = document.getElementById('arc-body');

  if(!filtered.length){
    if(statsEl) statsEl.innerHTML = '<span class="arc-stats-count">No results</span>';
    if(bodyEl)  bodyEl.innerHTML  = '<div class="arc-empty"><strong>No briefings found</strong>'+(searchTerm?'Try a different search term.':'Nothing here yet.')+'</div>';
    return;
  }

  // Group by month
  var groups = {}; // monthKey → entries[]
  var order  = []; // monthKey order
  filtered.forEach(function(e){
    if(!groups[e.monthKey]){ groups[e.monthKey]=[]; order.push(e.monthKey); }
    groups[e.monthKey].push(e);
  });

  var totalWeekday = filtered.filter(function(e){return !e.isWkend;}).length;
  if(statsEl) statsEl.innerHTML = '<span class="arc-stats-count"><strong>'+filtered.length+'</strong> briefing'+(filtered.length!==1?'s':'')+' &middot; <strong>'+totalWeekday+'</strong> market day'+(totalWeekday!==1?'s':'')+'</span>';

  var html='';
  order.forEach(function(mk){
    var grp = groups[mk];
    html += '<div class="arc-month-group">';
    html += '<div class="arc-month-label"><span>'+monthDisplay(mk)+'</span><span class="arc-month-count">'+grp.length+' briefing'+(grp.length!==1?'s':'')+'</span></div>';
    html += '<div class="arc-grid">';
    grp.forEach(function(e){
      var hasHL = e.headline && e.headline.trim();
      html +=
        '<a href="/daily'+(e.date?'/'+e.date.split('T')[0]:'')+'" class="arc-card'+(e.isWkend?' wkend':'')+'" title="Read the '+escHtml(e.shortLabel)+' briefing">'+
          '<div class="arc-card-head">'+
            '<span class="arc-card-date">'+escHtml(e.shortLabel)+'</span>'+
            '<span class="arc-card-badge '+(e.isWkend?'wkend':'wkday')+'">'+(e.isWkend?'Weekend':'Market Day')+'</span>'+
          '</div>'+
          '<div class="arc-card-hl'+(hasHL?'':' placeholder')+'">'+escHtml(hasHL?e.headline:'No briefing this day')+'</div>'+
          (e.lead?'<div class="arc-card-lead">'+escHtml(e.lead.slice(0,120)+(e.lead.length>120?'…':''))+'</div>':'')+
        '</a>';
    });
    html += '</div></div>';
  });
  if(bodyEl) bodyEl.innerHTML = html;
}

// ── Month filter pills ────────────────────────────────────────────────
function buildMonthFilters(){
  var months = {};
  allEntries.forEach(function(e){ months[e.monthKey] = (months[e.monthKey]||0)+1; });
  var keys = Object.keys(months);
  if(keys.length <= 1){ document.getElementById('arc-month-filters').style.display='none'; return; }

  var html = '<button class="arc-filter-btn active" data-month="">All</button>';
  keys.forEach(function(mk){
    html += '<button class="arc-filter-btn" data-month="'+escHtml(mk)+'">'+monthDisplay(mk)+'</button>';
  });

  var wrap = document.getElementById('arc-month-filters');
  if(wrap){
    wrap.innerHTML = html;
    wrap.addEventListener('click', function(e){
      var btn = e.target.closest('.arc-filter-btn');
      if(!btn)return;
      wrap.querySelectorAll('.arc-filter-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      activeMonth = btn.getAttribute('data-month') || null;
      render();
    });
  }
}

// ── Search ────────────────────────────────────────────────────────────
var searchInput = document.getElementById('arc-search');
var searchClear = document.getElementById('arc-search-clear');
if(searchInput){
  searchInput.addEventListener('input', function(){
    searchTerm = this.value.trim().toLowerCase();
    if(searchClear) searchClear.classList.toggle('vis', searchTerm.length > 0);
    render();
  });
}
if(searchClear){
  searchClear.addEventListener('click', function(){
    if(searchInput) searchInput.value='';
    searchTerm='';
    searchClear.classList.remove('vis');
    render();
  });
}

// ── Load archive ──────────────────────────────────────────────────────
fetch('/data/daily-archive/index.json', {cache:'no-store'})
  .then(function(r){ return r.ok ? r.json() : Promise.reject(r.status); })
  .then(function(manifest){
    var briefings = (manifest && manifest.briefings) || [];

    allEntries = briefings.map(function(item){
      var d = parseDateOnly(item.date);
      var isWkend = d ? (d.getDay()===0||d.getDay()===6) : false;
      if(item.market_closed) isWkend = true;
      return {
        date:       item.date || '',
        headline:   item.headline || '',
        lead:       item.lead || item.teaser || '',
        shortLabel: d ? shortLabel(d) : (item.date_display||item.label||item.date||''),
        monthKey:   d ? monthKey(d) : 'unknown',
        isWkend:    isWkend,
      };
    });

    document.getElementById('arc-loading').style.display='none';
    var content = document.getElementById('arc-content');
    if(content){ content.classList.add('vis'); }

    buildMonthFilters();
    render();
  })
  .catch(function(){
    var loadEl = document.getElementById('arc-loading');
    if(loadEl) loadEl.innerHTML = '<div class="arc-empty"><strong>Archive unavailable</strong>Check back later or <a href="/daily" style="color:var(--gold)">read today\'s briefing \u2192</a></div>';
  });

})();
</script>
<script>
(function(){
  var st;
  document.addEventListener('input',function(e){if(e.target&&e.target.id==='arc-search'){clearTimeout(st);var v=(e.target.value||'').trim();st=setTimeout(function(){if(window.gaEvent&&v)gaEvent('archive_search',{q:v.slice(0,40)});},800);}},true);
  document.addEventListener('click',function(e){var c=e.target.closest&&e.target.closest('.arc-card');if(c&&window.gaEvent){var dt=c.querySelector('.arc-card-date');gaEvent('briefing_open',{date:dt?dt.textContent:''});}},true);
})();
</script>
