name: Bake farm-bill page

# Edit farm-bill.json in the GitHub browser editor and commit.
# This Action re-bakes the static farm-bill.html and commits it back,
# so the values AI crawlers read are always current — no local tooling.
#
# Robust to file location: it finds build_farmbill.py, farm-bill.json, and
# farm-bill.html wherever they live in the repo (root or a subfolder), so it
# won't fail just because the script isn't at the repository root.

on:
  push:
    paths:
      - "**/farm-bill.json"
      - "**/build_farmbill.py"
      - ".github/workflows/farm-bill.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bake-farm-bill
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Locate files
        id: find
        run: |
          set -e
          SCRIPT=$(find . -name build_farmbill.py -not -path './.git/*' -not -path '*/node_modules/*' | head -1)
          JSON=$(find .   -name farm-bill.json   -not -path './.git/*' -not -path '*/node_modules/*' | head -1)
          HTML=$(find .   -name farm-bill.html   -not -path './.git/*' -not -path '*/node_modules/*' | head -1)
          if [ -z "$SCRIPT" ] || [ -z "$JSON" ] || [ -z "$HTML" ]; then
            echo "::error::Could not find all required files."
            echo "  build_farmbill.py = '$SCRIPT'"
            echo "  farm-bill.json    = '$JSON'"
            echo "  farm-bill.html    = '$HTML'"
            echo "Commit build_farmbill.py and farm-bill.json into the repo (any folder is fine)."
            exit 1
          fi
          echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"
          echo "json=$JSON"     >> "$GITHUB_OUTPUT"
          echo "html=$HTML"     >> "$GITHUB_OUTPUT"
          echo "Found: script=$SCRIPT  json=$JSON  html=$HTML"

      - name: Bake static HTML from JSON
        run: |
          python3 "${{ steps.find.outputs.script }}" \
            --html "${{ steps.find.outputs.html }}" \
            --json "${{ steps.find.outputs.json }}"

      - name: Commit if changed
        run: |
          HTML="${{ steps.find.outputs.html }}"
          if [ -n "$(git status --porcelain "$HTML")" ]; then
            git config user.name  "agsist-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$HTML"
            git commit -m "chore: bake farm-bill.html from farm-bill.json [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "farm-bill.html already in sync — nothing to commit."
          fi
