# .github/workflows/markets.yml
# Fetches Kalshi + Polymarket prediction markets relevant to agriculture
# Runs once daily — 7 days/week (Kalshi/Polymarket trade 24/7)
name: Fetch Markets

on:
  schedule:
    # 5:30am CT (11:30 UTC) — every day, before daily briefing at 5:45am CT
    - cron: '30 11 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch markets
        run: python scripts/fetch_markets.py

      - name: Commit and push
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/markets.json
          git diff --staged --quiet || git commit -m "🎯 Markets — $(date -u +%Y-%m-%d)"
          git push
