name: Fetch Outlooks (NOAA + USDM)

on:
  schedule:
    # Hourly. NOAA outlooks update ~twice a month and USDM weekly, so this is
    # heavily over-spec'd, but it lines up with the rest of the AGSIST cron
    # cadence and lets us catch a refresh inside the hour after upstream posts.
    - cron: '15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-outlooks
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetcher
        run: python3 scripts/fetch_outlooks.py

      - name: Commit if anything changed
        run: |
          git config user.name  "agsist-bot"
          git config user.email "sig@farmers1st.com"
          git add data/outlooks/
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "outlooks: refresh NOAA + USDM ($(date -u +%FT%TZ))"
          git push
