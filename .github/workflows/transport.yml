name: transport

# Weekly AgTransport pull for /basis + /bushel-journey. AMS publishes the
# Grain Transportation Report Thursdays; Friday morning catches it settled.
# Selftest gates the fetch; fetch fails loud on any empty dataset.
on:
  schedule:
    - cron: '43 11 * * 5'   # Fridays ~06:43 CT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: transport
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Selftest (gate)
        run: python scripts/fetch_transport.py --selftest
      - name: Fetch
        run: python scripts/fetch_transport.py
      - name: Commit
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/transport/
          if git diff --staged --quiet; then echo "no change"; exit 0; fi
          git commit -m "data: AgTransport basis + journey $(date -u +%F)"
          git pull --rebase --autostash origin main || true
          git push
