name: Build What's Priced In

on:
  push:
    paths:
      - "data/wpi-estimates.json"
      - "data/wpi-history.json"
      - "scripts/build_whats_priced_in.py"
  schedule:
    - cron: "20 11 * * *"   # 11:20 UTC daily — rolls the "next report" card over as dates pass
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: whats-priced-in
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build whats-priced-in.json
        run: python scripts/build_whats_priced_in.py
      - name: Commit if changed
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/whats-priced-in.json
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "Update what's priced in $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
