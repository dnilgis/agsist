name: Fetch Prices

# WHY THIS IS A LOOP, NOT A */30 CRON:
# GitHub's scheduled-cron is best-effort and silently DROPS high-frequency
# (every-30-min) runs — and will auto-disable a schedule that fails repeatedly.
# That is why prices went stale and showed "no scheduled runs, only manual."
# Instead of needing ~20 fragile cron fires a day, ONE reliable launch runs an
# internal loop that fetches every 30 min for the whole trading session.
# A couple of low-frequency starts (far more reliable than */30) kick it off,
# and the manual button always works. NOTE: the long-running job uses Actions
# minutes continuously — this is free on a PUBLIC repo (unlimited minutes); on a
# PRIVATE repo it would burn the free tier, so use an external pinger instead.

on:
  workflow_dispatch:
  schedule:
    # Low-frequency, off-:00 minutes (GitHub honors these far more reliably than */30).
    # Each launch covers ~5.25h of 30-min fetches, so 1 successful fire = a full session.
    - cron: '17 13 * * 1-5'   # ~08:17 CT — start before the 08:30 day-session open
    - cron: '3 16 * * 1-5'    # midday recovery launch (in case the morning one was dropped)
    - cron: '17 1 * * 2-6'    # overnight session (best-effort)

# Newest launch wins — a restart takes over cleanly instead of queueing a 5h job.
concurrency:
  group: fetch-prices
  cancel-in-progress: true

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # guard well under the 6h hosted-runner ceiling
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      # Selftests gate the loop: if the ONE expiry/roll rule or the roll marker
      # is broken, fail RED here — before a bad feed gets committed 10x/session.
      - name: Selftest — contract calendar + roll marking
        run: |
          python scripts/contract_calendar.py
          python scripts/test_mark_rolls.py

      - name: Fetch loop (every 30 min for the session)
        run: |
          set -uo pipefail
          git config user.name  "AGSIST Bot"
          git config user.email "bot@agsist.com"

          END=$(( $(date +%s) + 5*3600 + 1200 ))   # run ~5h20m, then exit before timeout
          CYCLE=0
          while :; do
            CYCLE=$((CYCLE+1))
            echo "::group::Cycle $CYCLE — $(date -u +'%H:%M:%SZ')"

            python scripts/fetch_prices.py || echo "fetch_prices.py exited non-zero (kept last values)"

            if ! git diff --quiet -- data/prices.json; then
              git add data/prices.json
              git commit -m "💹 Prices — $(date -u +'%Y-%m-%d %H:%M UTC')"
              # rebase-safe push with retry: pull AFTER commit, take our fresh copy on conflict
              pushed=0
              for i in 1 2 3 4 5; do
                git pull --rebase --autostash origin main || {
                  git checkout --theirs data/prices.json 2>/dev/null || true
                  git add data/prices.json
                  git rebase --continue 2>/dev/null || git rebase --abort 2>/dev/null || true
                }
                if git push origin main; then pushed=1; echo "pushed (attempt $i)"; break; fi
                echo "push attempt $i lost a race; retrying…"; sleep $((RANDOM % 5 + 2))
              done
              [ "$pushed" = "0" ] && echo "::warning::could not push this cycle; will retry next cycle"
            else
              echo "no price change this cycle"
            fi
            echo "::endgroup::"

            NOW=$(date +%s); REMAIN=$(( END - NOW ))
            [ "$REMAIN" -le 60 ] && { echo "session window done, exiting"; break; }
            SLEEP=1800; [ "$SLEEP" -gt "$REMAIN" ] && SLEEP="$REMAIN"
            echo "sleeping ${SLEEP}s until next fetch…"
            sleep "$SLEEP"
          done
