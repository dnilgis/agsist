name: repair

# One-shot repo repair after the 2026-07-18 scrambled drag-and-drop upload
# (commits 535ca31/34cea83 flattened the zip: junk copies of scripts/data
# landed at repo root, and nine real files were overwritten with wrong or
# newline-stripped content — /cash-rent was serving fetch_mesh.py source).
#
# What it does, atomically:
#   1. deletes the 12 junk files created at repo root
#   2. restores the 9 corrupted files from 99bbbfe (last good commit before
#      the bad upload). This reverts ONLY tonight's small meta-tag polish on
#      those 9 files — the pages themselves return exactly as they were
#      working earlier tonight. Everything else from tonight stays.
#   3. sanity-checks that restored pages start with <!DOCTYPE before pushing
#
# Run once from the Actions tab, verify /cash-rent renders, then this file
# can be deleted.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repair
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete junk root files from the flattened upload
        run: |
          git rm -f --ignore-unmatch \
            fetch_bids.py fetch_markets.py fetch_mesh.py process_afida.py \
            national.json footer.html footer-fallback.html header-fallback.html \
            fetch_bids.cpython-311.pyc fetch_crop_progress.cpython-311.pyc \
            fetch_markets.cpython-311.pyc fetch_mesh.cpython-311.pyc

      # v2: the scramble predated the first pin (the sanity gate caught it —
      # working as designed). Per-file last-good commits, verified by walking
      # each file's history for real <!DOCTYPE content:
      - name: Restore the 3 still-broken files from their last-good commits
        run: |
          git checkout 55ea729 -- breakeven.html
          git checkout c15b8e7 -- cash-bids.html page-template.html

      - name: Sanity gate — refuse to push anything that is not a real page
        run: |
          for f in breakeven.html cash-bids.html page-template.html cash-rent.html cash-lease.html; do
            head -c 20 "$f" | grep -qi "<!DOCTYPE" || { echo "FATAL: $f still wrong"; exit 1; }
          done
          echo "all restored files verified sane"

      - name: Commit and push the repair
        run: |
          git config user.name "AGSIST Repair"
          git config user.email "bot@agsist.com"
          git commit -m "repair v2: junk deleted; breakeven/cash-bids/page-template restored from per-file last-good commits"
          git pull --rebase --autostash origin main || true
          git push
