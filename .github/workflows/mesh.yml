name: MESH radar hail swaths — daily

# Pulls NOAA MRMS daily-max MESH from the Iowa State archive, vectorizes the
# >=0.75/1/1.5/2 inch bands to GeoJSON, and publishes to data/hail/mesh/.
# Run it by hand first with days=30 to backfill the season, then the daily
# cron keeps it current. The map's Storm Swaths control appears automatically
# once index.json has dates — nothing to flip on.

on:
  schedule:
    - cron: '25 8 * * *'   # 08:25 UTC — previous UTC day complete and archived
  workflow_dispatch:
    inputs:
      date:
        description: 'UTC day YYYY-MM-DD (default: yesterday)'
        required: false
      days:
        description: 'Backfill this many days counting back from date'
        required: false
        default: '1'

permissions:
  contents: write

concurrency:
  group: mesh
  cancel-in-progress: false

jobs:
  mesh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: System eccodes (GRIB2 decoder)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libeccodes0 libeccodes-data

      - name: Python deps
        run: pip install --quiet numpy matplotlib requests xarray cfgrib

      - name: Offline selftest (contour engine)
        run: python scripts/fetch_mesh.py --selftest

      - name: Process day(s)
        run: |
          END="${{ github.event.inputs.date }}"
          N="${{ github.event.inputs.days }}"
          [ -z "$N" ] && N=1
          [ -z "$END" ] && END=$(date -u -d 'yesterday' +%F)
          for i in $(seq 0 $((N-1))); do
            D=$(date -u -d "$END - $i day" +%F)
            python scripts/fetch_mesh.py "$D" || echo "day $D failed — continuing"
          done

      - name: Refresh recent-reports layer (last 30 days)
        run: python scripts/fetch_hail.py --recent || echo "recent refresh failed — yearly data unaffected"

      - name: Generate storm-day pages
        run: python scripts/generate_hail_events.py || echo "storm pages failed - data unaffected"

      - name: Commit if changed (conflict-armored)
        run: |
          git config user.name  "agsist-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git add -A
          git commit -m "mesh: radar hail swaths update"
          # manifest.json is the one file several bots write; if another workflow
          # pushed while we ran, rebase conflicts there. Recovery: take main's
          # manifest, re-apply our recent/storm layers on top, retry. Three tries.
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              git push && exit 0
            fi
            echo "rebase conflict (attempt $i) — taking main's manifest and regenerating"
            git rebase --abort || true
            git fetch origin main
            git checkout origin/main -- data/hail/manifest.json || true
            python scripts/fetch_hail.py --recent || true
            python scripts/generate_hail_events.py || true
            git add -A
            git commit --amend --no-edit
          done
          echo "push failed after 3 attempts — re-run this workflow"
          exit 1

      - name: IndexNow ping (Bing learns about new pages in seconds)
        run: |
          Y=$(date -u -d 'yesterday' +%F)
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{"host":"agsist.com","key":"f4a81c26db974e0f92c35b7a6e10d8c4","keyLocation":"https://agsist.com/f4a81c26db974e0f92c35b7a6e10d8c4.txt","urlList":["https://agsist.com/hail-map","https://agsist.com/hail/","https://agsist.com/hail/'"$Y"'","https://agsist.com/sitemap.xml"]}' \
            || echo "IndexNow ping failed - harmless"
