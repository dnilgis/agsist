name: Generate Daily Briefing

on:
  schedule:
    # 11:02 UTC every day.
    #   = 6:02 AM Central (CDT, summer) / 5:02 AM Central (CST, winter)
    #
    # Offset 2 min from the prices-fetch workflow (which fires at :00
    # and :30 of every hour) so prices.json has time to commit before
    # the briefing reads it. No DST adjustment needed year-round —
    # both seasons publish comfortably before the 7 AM Central deadline,
    # even with typical GitHub Actions cron delays (occasionally 30+ min
    # during peak load).
    - cron: '2 11 * * *'
    # v4.6: Friday post-close regeneration.
    # 20:00 UTC Fri = 3:00 PM Central (CDT) / 2:00 PM Central (CST).
    # CBOT grain settles 1:20 PM CT, CME livestock 1:00 PM CT, NYMEX
    # crude 1:30 PM CT. Running at 2:00 PM CT (winter) / 3:00 PM CT
    # (summer) puts us safely past all settlement windows year-round so
    # locked_prices reflects actual Friday closes. This replaces the
    # morning Friday briefing with the corrected one, eliminating the
    # failure mode where Friday's email goes out with intraday prices
    # and Saturday's recap shows different numbers. Saturday's 11:02
    # UTC run still happens normally on top of this.
    - cron: '0 20 * * 5'
  workflow_dispatch:

jobs:
  # If a manual run already generated today's briefing, the scheduled morning
  # run skips regeneration entirely. The Friday 20:00 UTC post-close regen is
  # exempt (hour >= 14) — it exists to overwrite the morning file on purpose.
  # Manual dispatches always run.
  gate:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.g.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
      - id: g
        run: |
          H=$(date -u +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$H" -lt 14 ] && [ -f "data/daily-archive/$(date -u +%F).json" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "today's briefing already exists (a manual run beat the schedule) — skipping regeneration"
          fi

  generate:
    needs: gate
    if: needs.gate.outputs.skip != '1'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: GATE 1 — feed pre-flight (repair ZC=F roll contamination; block on unrepairable feed)
        run: python scripts/preflight_prices.py data/prices.json --repair

      - name: Generate daily briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_daily.py

      # Grade yesterday's call deterministically (direction AND level) from the
      # actual closes, overriding any LLM-assigned outcome — so the public scorecard
      # can never show a miss as a win. Before the critic + GATE 2 so they see truth.
      - name: Grade yesterday's call
        run: python scripts/grade_calls.py data/daily.json

      # v4.0: Critic pass — runs after generate, before schema validation.
      # Sends the briefing back to Claude as the editor, scores 1-10 on each
      # of 17 rules (8 IMPACT + voice, forward test, thread coherence + spread
      # quality + YC honesty + level coherence + one-number coherence +
      # markdown-not-HTML + macro anchoring). If 2+ rules score below 7 OR
      # voice<5 OR forward test<5 OR level coherence<7 OR markdown<7, rewrites
      # the weakest target and re-saves daily.json + archive HTML.
      #
      # continue-on-error: true means a critic API failure (network, bad response,
      # rate limit) does NOT block the briefing from shipping. The original
      # generator output is what gets validated and committed.
      #
      # v4.2 (Phase 2 C5): the critic itself now retries up to 3 times with
      # exponential backoff before giving up. continue-on-error remains as
      # belt-and-suspenders for catastrophic failures.
      #
      # v4.6 (2026-05-18): critic Rule 9 voice-failure list extended with
      # CNBC drama verbs (explode, crater, surge, soar, plunge, slash, etc.)
      # to match generator v4.6.0's editorial-hardening upgrade.
      #
      # First few days: consider adding `--dry-run` to the run command to see
      # what the critic flags before letting it rewrite anything. Remove the
      # flag once you trust the scoring calibration.
      - name: Run critic pass
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
        run: python scripts/critique_briefing.py

      # v4.2 (Phase 2 C7): post-critic ops alert. Reads daily.json's
      # critic_pass.final_scores; emails sig@farmers1st.com if any rule
      # scored below 7, if rewrites were applied, or if the critic step
      # failed silently. Quiet success = no email. Catches the silent-drift
      # failure mode that continue-on-error: true otherwise hides.
      #
      # Requires GMAIL_USER + GMAIL_APP_PASS repo secrets. If unset, the
      # script logs the alert content to the workflow log instead of failing.
      #
      # always() runs this even if previous steps failed — that's the point.
      # if: always() so the alert reports generator failures too.
      # ── GATE 2 ── deterministic pre-publish gate. Prose vs locked_prices vs the
      # clean feed: blocks locked-price drift, level contradictions, drama without a
      # real move, calendar errors, fabricated sections. HARD block (no continue-on-error)
      # so a failure stops the job before commit — nothing stale or wrong gets published.
      - name: GATE 2 — pre-publish briefing gate
        run: python scripts/briefing_gate.py data/daily.json --prices data/prices.json

      - name: Notify critic status
        if: always()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python scripts/notify_critic_status.py
        continue-on-error: true

      - name: Validate schema
        # Fails the workflow if daily.json drifts from canonical field
        # names or contains filler content like "Unknown" attributions.
        # On failure, yesterday's briefing stays live until the next
        # successful run. GitHub emails the workflow owner on failure.
        #
        # NOTE (v4.2): daily.json supports new optional fields:
        #   the_takeaway, subject_line, named_week (top-level)
        #   vs_yesterday (per-section)
        # Schema knows about these — generator will start emitting them
        # as the prompt is updated.
        run: python scripts/daily_schema.py data/daily.json

      - name: Generate RSS feed
        continue-on-error: true        # RSS is an enhancement; a feed error must never block the publish
        run: python scripts/generate_rss.py

      # Strategic ladder (2026-06-12): public call scorecard, rebuilt from the
      # archive JSONs after every briefing. Honest by construction — outcomes
      # come straight from each day's yesterdays_call block, misses included.
      # continue-on-error: the scorecard is an enhancement. A failure here
      # must NEVER block the briefing from publishing.
      - name: Build call scorecard
        continue-on-error: true
        run: python scripts/build_scorecard.py

      # Static-bake today's briefing + The Read into index.html so AI crawlers
      # (GPTBot, ClaudeBot, PerplexityBot — none execute JS) and Googlebot's
      # first pass see the actual content. Client JS hydrates live data on top.
      # continue-on-error: if index.html's markup ever drifts from the bake
      # anchors, bake_homepage.py exits 3 — that must show as a red step, not
      # stop the briefing publish. The homepage still works via JS hydration.
      - name: Bake briefing into homepage
        continue-on-error: true
        run: python scripts/bake_homepage.py

      # Audit fix 2026-06-12: each new /daily/YYYY-MM-DD archive page gets a
      # sitemap entry the moment it publishes (Google discovery for the
      # briefing archive). Guarded: weekend/holiday runs that don't write an
      # archive HTML page add nothing. Idempotent: the Friday post-close
      # regeneration re-run is a no-op for an already-listed URL.
      - name: Add today's archive page to sitemap
        continue-on-error: true        # sitemap update must never block the briefing publish
        run: |
          d=$(date -u +%Y-%m-%d)
          if [ -f "daily/${d}.html" ]; then
            python scripts/update_sitemap.py --add "https://agsist.com/daily/${d}"
          else
            echo "no daily/${d}.html — skipping sitemap add"
          fi

      - name: Commit and push
        run: |
          git config user.name "AGSIST Bot"
          git config user.email "bot@agsist.com"
          git add data/daily.json data/daily-archive/ daily/ feed.xml sitemap.xml data/scorecard.json index.html
          git diff --staged --quiet || git commit -m "AGSIST Daily — $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main
          git push

      # Email the finished briefing as a clean, reforwardable copy. Runs only after
      # GATE 2 passed (hard block above stops the job on failure) and the commit
      # succeeded — so a blocked or stale briefing is never emailed. send_daily.py
      # re-checks generated_at==today and price_validation_clean as belt-and-suspenders.
      # Default recipient is the subscriber list (RECIPIENTS secret, or live from the subs worker via LIST_URL).
      - name: Send daily email
        env:
          # new sender env names; falls back to the legacy GMAIL_* secrets so
          # either set works. RECIPIENTS is ignored when LIST_URL is set
          # (list pulled live from the subs worker).
          SMTP_USER:    ${{ secrets.SMTP_USER || secrets.GMAIL_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS || secrets.GMAIL_APP_PASS }}
          RECIPIENTS:   ${{ secrets.RECIPIENTS }}
          LIST_URL:     ${{ secrets.LIST_URL }}
          LIST_TOKEN:   ${{ secrets.LIST_TOKEN }}
          UNSUB_SECRET: ${{ secrets.UNSUB_SECRET }}
          FROM_NAME:    ${{ secrets.FROM_NAME }}
          REPLY_TO:     ${{ secrets.REPLY_TO }}
        run: python scripts/send_daily.py
